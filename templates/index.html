<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshMonitor | Chat Feed</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/idiomorph/dist/idiomorph-ext.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --mesh-primary: #8b5cf6;
            --mesh-secondary: #ec4899;
            --mesh-bg: #0f172a;
            --mesh-card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050511; /* Deeper dark for more contrast */
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-feed {
            animation: fadeInDown 0.5s ease-out;
        }
    </style>
    <meta name="description"
        content="Premium real-time chat feed for Meshtastic nodes. Monitor signal strength, hop counts, and messages in a sleek dark interface.">
</head>

<body class="p-4 md:p-8 relative selection:bg-violet-500/30 overflow-x-hidden">
    <!-- Ambient Background Lighting (Orbs) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-violet-600/30 blur-[120px] mix-blend-screen animate-[pulse_8s_ease-in-out_infinite]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-pink-600/20 blur-[120px] mix-blend-screen animate-[pulse_10s_ease-in-out_infinite_reverse]"></div>
        <div class="absolute top-[30%] left-[50%] w-[40%] h-[40%] rounded-full bg-blue-600/10 blur-[100px] mix-blend-screen animate-[pulse_12s_ease-in-out_infinite]"></div>
    </div>

    <div class="max-w-4xl mx-auto relative z-10">
        <header class="mb-14 text-center mt-4">
            <h1
                class="text-6xl font-bold tracking-tight bg-gradient-to-br from-white via-violet-200 to-pink-300 bg-clip-text text-transparent mb-3 drop-shadow-sm">
                {{ page_title }}
            </h1>
            {% if page_subtitle %}
            <p class="text-slate-400 font-light flex items-center justify-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                {{ page_subtitle }}
            </p>
            {% endif %}
        </header>

        <main id="chat-feed" hx-get="/feed" hx-trigger="every {{ poll_interval }}s" hx-ext="morph"
            hx-swap="morph:innerHTML transition:true" class="space-y-4">
            {% include "fragments/message_list.html" %}
        </main>

        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p></p>
        </footer>
    </div>
</body>

</html>
